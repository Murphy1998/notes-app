<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>📋 我的笔记 · flomo style</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我的笔记">
<meta name="theme-color" content="#4a7c59">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<style>
  :root {
    --bg: #f8f6f2;
    --card-bg: #ffffff;
    --text: #2c2c2c;
    --text-secondary: #8c8c8c;
    --text-muted: #bfbfbf;
    --border: #e8e4dc;
    --tag-bg: #f0ede6;
    --tag-text: #6b6558;
    --accent: #4a7c59;
    --accent-light: #e8f0ea;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ===== 顶栏 ===== */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(248, 246, 242, 0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }

  .topbar-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    letter-spacing: -0.5px;
  }

  .search-box {
    flex: 1;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 8px 14px 8px 36px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 14px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .stats .count {
    font-weight: 700;
    color: var(--accent);
    font-size: 18px;
  }

  /* ===== 主布局 ===== */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  /* ===== 分类 Tab ===== */
  .category-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .category-tab {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    transition: all 0.2s;
    user-select: none;
  }

  .category-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .category-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .category-tab .badge {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 0 6px;
    margin-left: 4px;
    font-size: 11px;
    min-width: 18px;
    text-align: center;
  }

  .category-tab:not(.active) .badge {
    background: var(--tag-bg);
  }

  /* ===== 标签云 ===== */
  .tag-cloud {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .tag-chip {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    background: var(--tag-bg);
    color: var(--tag-text);
    border: 1px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .tag-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tag-chip.active {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }

  /* ===== 结果提示 ===== */
  .result-hint {
    text-align: center;
    padding: 12px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ===== 日期分组 ===== */
  .date-group { margin-bottom: 28px; }

  .date-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 4px;
  }

  /* ===== 卡片流 ===== */
  .card-flow {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
    border-color: #d5cfc4;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .card-summary {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .card-source {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: #f5f3ef;
    color: var(--text-secondary);
  }

  .card-date {
    font-size: 11px;
    color: var(--text-muted);
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .card-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-light);
    color: var(--accent);
  }

  .card-external-icon {
    position: absolute;
    top: 18px;
    right: 20px;
    color: var(--text-muted);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-external-icon { opacity: 1; }

  /* ===== 备忘型卡片 ===== */
  .card.card-memo {
    cursor: pointer;
    border-left: 3px solid var(--accent);
  }

  .card-memo-icon {
    position: absolute;
    top: 18px;
    right: 20px;
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.3s;
  }

  .card.card-memo.expanded .card-memo-icon { transform: rotate(180deg); }

  .card-content {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
    white-space: pre-wrap;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.3s ease, padding-top 0.3s ease;
    margin-top: 0;
    padding-top: 0;
  }

  .card.card-memo.expanded .card-content {
    max-height: 2000px;
    opacity: 1;
    margin-top: 12px;
    padding-top: 12px;
  }

  .card.card-memo.expanded .card-summary { -webkit-line-clamp: unset; }

  .card-copy-btn {
    display: none;
    position: absolute;
    top: 16px;
    right: 44px;
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    z-index: 2;
  }

  .card.card-memo.expanded .card-copy-btn { display: inline-block; }

  .card-copy-btn:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  .card-copy-btn.copied {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ===== 空状态 ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; line-height: 1.8; }

  /* ===== 浮动新建按钮 ===== */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 28px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(74,124,89,0.4);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(74,124,89,0.5); }
  .fab:active { transform: scale(0.95); }

  /* ===== 弹窗遮罩 ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card-bg);
    width: 100%;
    max-width: 560px;
    border-radius: 16px 16px 0 0;
    padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    animation: slideUp 0.25s ease;
    max-height: 85vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-header h3 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .modal-close:hover { background: var(--tag-bg); }

  .form-group { margin-bottom: 14px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .form-group textarea { min-height: 80px; resize: vertical; }

  .form-row { display: flex; gap: 10px; }
  .form-row .form-group { flex: 1; }

  .form-actions { display: flex; gap: 10px; margin-top: 18px; }

  .btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { opacity: 0.9; }

  .btn-secondary {
    background: var(--card-bg);
    color: var(--text-secondary);
  }

  .btn-secondary:hover { background: var(--tag-bg); }

  /* ===== 删除按钮 ===== */
  .card-delete-btn {
    display: none;
    position: absolute;
    bottom: 16px;
    right: 20px;
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid #e0c8c8;
    border-radius: 6px;
    background: #fff;
    color: #b55;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 2;
  }

  .card.card-memo.expanded .card-delete-btn { display: inline-block; }

  .card-delete-btn:hover {
    background: #fde8e8;
    border-color: #c88;
  }

  /* ===== 状态提示 ===== */
  .sync-status {
    display: none;
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: #333;
    color: #fff;
    z-index: 10000;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    animation: fadeIn 0.2s ease;
  }

  .sync-status.success { background: var(--accent); }
  .sync-status.warn { background: #c57a20; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 600px) {
    .topbar-inner { flex-wrap: wrap; gap: 10px; }
    .search-box { order: 3; flex-basis: 100%; }
    .card { padding: 14px 16px; }
    .modal { padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); }
    .fab { bottom: 20px; right: 20px; }
  }

  /* ===== 密码锁屏 ===== */
  .lock-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lock-screen.hidden { display: none; }

  .lock-box { text-align: center; padding: 40px; }

  .lock-icon { font-size: 48px; margin-bottom: 16px; }

  .lock-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .lock-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .lock-input {
    width: 200px;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 20px;
    text-align: center;
    letter-spacing: 8px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-text-security: disc;
  }

  .lock-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-light);
  }

  .lock-input.error {
    border-color: #c55;
    animation: lockShake 0.4s ease;
  }

  @keyframes lockShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  .lock-hint { font-size: 12px; color: #c55; margin-top: 10px; height: 18px; }

  .lock-btn {
    margin-top: 16px;
    padding: 10px 36px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .lock-btn:hover { opacity: 0.9; }
</style>
</head>
<body>

<!-- 密码锁屏 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">我的笔记</div>
    <div class="lock-subtitle">请输入密码访问</div>
    <input class="lock-input" id="lockInput" type="tel" maxlength="10" placeholder="····" autofocus
      onkeydown="if(event.key==='Enter')unlockApp()">
    <div class="lock-hint" id="lockHint"></div>
    <button class="lock-btn" onclick="unlockApp()">解锁</button>
  </div>
</div>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topbar-inner">
    <span class="logo">📋 我的笔记</span>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索笔记标题、摘要、标签..." oninput="render()">
    </div>
    <div class="stats">
      <span class="count" id="totalCount">0</span> 条笔记
    </div>
  </div>
</div>

<!-- 主体 -->
<div class="main">
  <div class="category-tabs" id="categoryTabs"></div>
  <div class="tag-cloud" id="tagCloud"></div>
  <div class="result-hint" id="resultHint"></div>
  <div id="cardArea"></div>
</div>

<!-- 浮动新建按钮 -->
<button class="fab" onclick="openNewNote()" title="新建笔记">+</button>

<!-- 新建笔记弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">新建笔记</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="form-group">
      <label>标题 *</label>
      <input type="text" id="noteTitle" placeholder="笔记标题">
    </div>
    <div class="form-group">
      <label>链接（可选，留空则为备忘笔记）</label>
      <input type="url" id="noteLink" placeholder="https://...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分类</label>
        <select id="noteCategory"></select>
      </div>
      <div class="form-group">
        <label>来源</label>
        <input type="text" id="noteSource" placeholder="如：微信公众号">
      </div>
    </div>
    <div class="form-group">
      <label>标签（英文逗号分隔）</label>
      <input type="text" id="noteTags" placeholder="如：AI, 教程, OpenAI">
    </div>
    <div class="form-group">
      <label>摘要</label>
      <textarea id="noteSummary" placeholder="一句话概括这条笔记的核心内容" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>正文内容（备忘笔记展开后显示）</label>
      <textarea id="noteContent" placeholder="详细内容..." rows="4"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<script>
// ===== Supabase 配置 =====
const SUPABASE_URL = 'https://ocdsrpjkmfnoupasmqkt.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nbfWiQMdvMIXWwwtCYt0nQ_SPxE-wP5';

// ===== 分类定义 =====
const CATEGORIES = ["AI与机器学习", "编程技术", "产品与设计", "效率工具", "阅读与思考", "其他"];

// ===== 状态 =====
let __NOTES__ = []; // 所有笔记（从 Supabase 拉取）
let activeCategory = '全部';
let activeTag = null;

// ===== Supabase API =====
async function supaFetch(path, options = {}) {
  const resp = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  return resp;
}

// 从 Supabase 拉取所有笔记
async function loadNotes() {
  try {
    const resp = await supaFetch('notes?order=created_at.desc');
    if (!resp.ok) throw new Error('拉取失败');
    __NOTES__ = await resp.json();
    render();
  } catch(e) {
    console.log('拉取笔记失败:', e);
    showSyncStatus('加载失败，请检查网络', 'warn');
  }
}

// 新增笔记到 Supabase
async function insertNote(note) {
  const resp = await supaFetch('notes', {
    method: 'POST',
    headers: { 'Prefer': 'return=representation' },
    body: JSON.stringify(note)
  });
  if (!resp.ok) throw new Error('保存失败');
  return (await resp.json())[0];
}

// 从 Supabase 删除笔记
async function removeNote(noteId) {
  const resp = await supaFetch(`notes?id=eq.${noteId}`, {
    method: 'DELETE'
  });
  if (!resp.ok) throw new Error('删除失败');
}

// ===== 工具函数 =====
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  const days = Math.floor(diff / 86400000);

  if (days === 0) return '今天';
  if (days === 1) return '昨天';
  if (days < 7) return `${days} 天前`;
  if (days < 30) return `${Math.floor(days / 7)} 周前`;

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateGroup(dateStr) {
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  return `${y}年${m}月${day}日 ${weekdays[d.getDay()]}`;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function getAllNotes() {
  return __NOTES__;
}

function getFilteredNotes() {
  let notes = getAllNotes();

  if (activeCategory !== '全部') {
    notes = notes.filter(n => n.category === activeCategory);
  }

  if (activeTag) {
    notes = notes.filter(n => n.tags && n.tags.includes(activeTag));
  }

  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (query) {
    notes = notes.filter(n => {
      const searchStr = [
        n.title || '',
        n.summary || '',
        n.content || '',
        (n.tags || []).join(' '),
        n.source || '',
        n.category || ''
      ].join(' ').toLowerCase();
      return searchStr.includes(query);
    });
  }

  return notes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

function getAllTags() {
  const tagCount = {};
  getAllNotes().forEach(n => {
    (n.tags || []).forEach(t => {
      tagCount[t] = (tagCount[t] || 0) + 1;
    });
  });
  return Object.entries(tagCount).sort((a, b) => b[1] - a[1]);
}

function getCategoryCounts() {
  const all = getAllNotes();
  const counts = { '全部': all.length };
  CATEGORIES.forEach(cat => {
    counts[cat] = all.filter(n => n.category === cat).length;
  });
  return counts;
}

// ===== 渲染 =====
function render() {
  const notes = getFilteredNotes();
  const categoryCounts = getCategoryCounts();
  const allTags = getAllTags();

  document.getElementById('totalCount').textContent = notes.length;

  // 分类Tab
  const catTabs = document.getElementById('categoryTabs');
  catTabs.innerHTML = ['全部', ...CATEGORIES].map(cat => {
    const count = categoryCounts[cat] || 0;
    const activeCls = activeCategory === cat ? ' active' : '';
    return `<span class="category-tab${activeCls}" onclick="selectCategory('${cat.replace(/'/g, "\\'")}')">
      ${cat}<span class="badge">${count}</span>
    </span>`;
  }).join('');

  // 标签云
  const tagCloud = document.getElementById('tagCloud');
  if (allTags.length > 0) {
    tagCloud.innerHTML = allTags.map(([tag, count]) => {
      const activeCls = activeTag === tag ? ' active' : '';
      return `<span class="tag-chip${activeCls}" onclick="selectTag('${tag.replace(/'/g, "\\'")}')">
        #${tag} <span style="opacity:0.6">${count}</span>
      </span>`;
    }).join('');
    tagCloud.style.display = 'flex';
  } else {
    tagCloud.style.display = 'none';
  }

  // 结果提示
  const hint = document.getElementById('resultHint');
  hint.textContent = notes.length === 0
    ? '没有找到匹配的笔记，试试换个关键词或分类'
    : `共 ${notes.length} 条笔记`;

  // 卡片区
  const cardArea = document.getElementById('cardArea');

  if (notes.length === 0) {
    cardArea.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>这里还没有笔记</p>
        <p style="font-size:13px;margin-top:4px;">点击右下角 + 开始添加</p>
      </div>`;
    return;
  }

  // 按日期分组
  const groups = {};
  notes.forEach(n => {
    const dateKey = n.created_at ? n.created_at.split('T')[0] : 'unknown';
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(n);
  });

  cardArea.innerHTML = Object.entries(groups).map(([dateKey, groupNotes]) => {
    const cards = groupNotes.map(n => {
      const tagsHtml = (n.tags || []).map(t =>
        `<span class="card-tag" onclick="event.stopPropagation();selectTag('${t.replace(/'/g, "\\'")}')">#${t}</span>`
      ).join('');

      const isMemo = !n.link;

      if (isMemo) {
        const contentHtml = n.content ? `<div class="card-content">${escapeHtml(n.content).replace(/\n/g, '<br>')}</div>` : '';
        const copyId = 'copy-' + (n.id || Math.random().toString(36).slice(2));
        const deleteBtn = `<button class="card-delete-btn" onclick="event.stopPropagation();deleteNote('${(n.id || '').replace(/'/g, "\\'")}')">删除</button>`;
        return `<div class="card card-memo" onclick="toggleMemo(this)">
          <button class="card-copy-btn" id="${copyId}" onclick="event.stopPropagation();copyNote(this, '${(n.id || '').replace(/'/g, "\\'")}')" title="复制全文">复制</button>
          <span class="card-memo-icon">▼</span>
          <div class="card-title">${escapeHtml(n.title || '无标题')}</div>
          <div class="card-summary">${escapeHtml(n.summary || '暂无摘要')}</div>
          ${contentHtml}
          <div class="card-meta">
            ${n.source ? `<span class="card-source">${escapeHtml(n.source)}</span>` : ''}
            <span class="card-date">${formatDate(n.created_at)}</span>
            <div class="card-tags">${tagsHtml}</div>
          </div>
          ${deleteBtn}
        </div>`;
      } else {
        return `<a class="card" href="${n.link}" target="_blank" rel="noopener">
          <span class="card-external-icon">↗</span>
          <div class="card-title">${escapeHtml(n.title || '无标题')}</div>
          <div class="card-summary">${escapeHtml(n.summary || '暂无摘要')}</div>
          <div class="card-meta">
            ${n.source ? `<span class="card-source">${escapeHtml(n.source)}</span>` : ''}
            <span class="card-date">${formatDate(n.created_at)}</span>
            <div class="card-tags">${tagsHtml}</div>
          </div>
        </a>`;
      }
    }).join('');

    return `<div class="date-group">
      <div class="date-label">${formatDateGroup(dateKey)}</div>
      <div class="card-flow">${cards}</div>
    </div>`;
  }).join('');
}

// ===== 交互 =====
function toggleMemo(el) { el.classList.toggle('expanded'); }

function copyNote(btn, noteId) {
  const note = __NOTES__.find(n => n.id === noteId);
  if (!note) return;

  let text = note.title + '\n\n';
  if (note.summary) text += note.summary + '\n\n';
  if (note.content) text += note.content;
  if (note.link) text += '\n\n链接：' + note.link;

  navigator.clipboard.writeText(text.trim()).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text.trim();
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
  });
}

function selectCategory(cat) {
  activeCategory = cat;
  activeTag = null;
  document.getElementById('searchInput').value = '';
  render();
}

function selectTag(tag) {
  if (activeTag === tag) {
    activeTag = null;
  } else {
    activeTag = tag;
    activeCategory = '全部';
  }
  document.getElementById('searchInput').value = '';
  render();
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    activeCategory = '全部';
    activeTag = null;
    document.getElementById('searchInput').value = '';
    render();
  }
});

// ===== 新建笔记 =====
function openNewNote() {
  document.getElementById('modalTitle').textContent = '新建笔记';
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteLink').value = '';
  document.getElementById('noteSource').value = '';
  document.getElementById('noteTags').value = '';
  document.getElementById('noteSummary').value = '';
  document.getElementById('noteContent').value = '';

  const sel = document.getElementById('noteCategory');
  sel.innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');

  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('noteTitle').focus(), 200);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

async function saveNote() {
  const title = document.getElementById('noteTitle').value.trim();
  if (!title) { document.getElementById('noteTitle').style.borderColor='#c55'; return; }

  const link = document.getElementById('noteLink').value.trim();
  const category = document.getElementById('noteCategory').value;
  const source = document.getElementById('noteSource').value.trim();
  const tagsStr = document.getElementById('noteTags').value.trim();
  const summary = document.getElementById('noteSummary').value.trim();
  const content = document.getElementById('noteContent').value.trim();

  const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

  const note = {
    id: 'n' + Date.now().toString(36),
    title,
    category,
    tags,
    summary: summary || '',
    source: source || '',
    created_at: new Date().toISOString()
  };

  if (link) note.link = link;
  if (content) note.content = content;

  closeModal();
  showSyncStatus('正在保存...');

  try {
    const saved = await insertNote(note);
    __NOTES__.unshift(saved);
    render();
    showSyncStatus('保存成功！', 'success');
  } catch(e) {
    console.log('保存失败:', e);
    showSyncStatus('保存失败，请检查网络后重试', 'warn');
  }
}

async function deleteNote(noteId) {
  if (!confirm('确定删除这条笔记？')) return;

  showSyncStatus('正在删除...');
  try {
    await removeNote(noteId);
    __NOTES__ = __NOTES__.filter(n => n.id !== noteId);
    render();
    showSyncStatus('删除成功', 'success');
  } catch(e) {
    showSyncStatus('删除失败，请稍后重试', 'warn');
  }
}

// ===== 状态提示 =====
function showSyncStatus(msg, type) {
  let el = document.getElementById('syncStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'syncStatus';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = 'sync-status';
  if (type) el.classList.add(type);
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ===== 密码锁 =====
const __PWD_HASH__ = 'x20r';

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return h.toString(36);
}

function checkAuth() {
  return sessionStorage.getItem('notes-auth') === __PWD_HASH__;
}

function unlockApp() {
  const input = document.getElementById('lockInput');
  const hint = document.getElementById('lockHint');
  const pwd = input.value.trim();
  if (simpleHash(pwd) === __PWD_HASH__) {
    sessionStorage.setItem('notes-auth', __PWD_HASH__);
    document.getElementById('lockScreen').classList.add('hidden');
    hint.textContent = '';
    loadNotes(); // 解锁后从 Supabase 拉取数据
  } else {
    input.classList.add('error');
    hint.textContent = '密码错误，请重试';
    input.value = '';
    setTimeout(() => input.classList.remove('error'), 500);
  }
}

// ===== 初始化 =====
if (checkAuth()) {
  document.getElementById('lockScreen').classList.add('hidden');
  loadNotes();
}

// ===== PWA Service Worker =====
if ('serviceWorker' in navigator) {
  // 清理所有旧缓存和旧 SW
  caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
  navigator.serviceWorker.getRegistrations().then(regs => {
    regs.forEach(r => r.unregister());
  });
}
