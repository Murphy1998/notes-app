<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>📋 我的笔记 · flomo style</title>
<!-- PWA -->
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我的笔记">
<meta name="theme-color" content="#4a7c59">
<style>
  :root {
    --bg: #f8f6f2;
    --card-bg: #ffffff;
    --text: #2c2c2c;
    --text-secondary: #8c8c8c;
    --text-muted: #bfbfbf;
    --border: #e8e4dc;
    --tag-bg: #f0ede6;
    --tag-text: #6b6558;
    --accent: #4a7c59;
    --accent-light: #e8f0ea;
    --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ===== 顶栏 ===== */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(248, 246, 242, 0.85);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
  }

  .topbar-inner {
    max-width: 720px;
    margin: 0 auto;
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    letter-spacing: -0.5px;
  }

  .search-box {
    flex: 1;
    position: relative;
  }

  .search-box input {
    width: 100%;
    padding: 8px 14px 8px 36px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 14px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    transition: all 0.2s;
  }

  .search-box input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .search-box input::placeholder { color: var(--text-muted); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 16px;
    pointer-events: none;
  }

  .stats {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 13px;
    color: var(--text-secondary);
    white-space: nowrap;
  }

  .stats .count {
    font-weight: 700;
    color: var(--accent);
    font-size: 18px;
  }

  /* ===== 主布局 ===== */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 24px 60px;
  }

  /* ===== 分类 Tab ===== */
  .category-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .category-tab {
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-secondary);
    transition: all 0.2s;
    user-select: none;
  }

  .category-tab:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .category-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .category-tab .badge {
    display: inline-block;
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 0 6px;
    margin-left: 4px;
    font-size: 11px;
    min-width: 18px;
    text-align: center;
  }

  .category-tab:not(.active) .badge {
    background: var(--tag-bg);
  }

  /* ===== 标签云 ===== */
  .tag-cloud {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }

  .tag-chip {
    padding: 4px 12px;
    border-radius: 14px;
    font-size: 12px;
    cursor: pointer;
    background: var(--tag-bg);
    color: var(--tag-text);
    border: 1px solid transparent;
    transition: all 0.2s;
    user-select: none;
  }

  .tag-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tag-chip.active {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
    font-weight: 600;
  }

  /* ===== 结果提示 ===== */
  .result-hint {
    text-align: center;
    padding: 12px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ===== 日期分组 ===== */
  .date-group {
    margin-bottom: 28px;
  }

  .date-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    padding-left: 4px;
  }

  /* ===== 卡片流 ===== */
  .card-flow {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: pointer;
    position: relative;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card:hover {
    box-shadow: var(--shadow-hover);
    transform: translateY(-1px);
    border-color: #d5cfc4;
  }

  .card-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text);
  }

  .card-summary {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.7;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    flex-wrap: wrap;
  }

  .card-source {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: #f5f3ef;
    color: var(--text-secondary);
  }

  .card-date {
    font-size: 11px;
    color: var(--text-muted);
  }

  .card-tags {
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }

  .card-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--accent-light);
    color: var(--accent);
  }

  .card-external-icon {
    position: absolute;
    top: 18px;
    right: 20px;
    color: var(--text-muted);
    font-size: 14px;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card:hover .card-external-icon {
    opacity: 1;
  }

  /* ===== 备忘型卡片 ===== */
  .card.card-memo {
    cursor: pointer;
    border-left: 3px solid var(--accent);
  }

  .card-memo-icon {
    position: absolute;
    top: 18px;
    right: 20px;
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.3s;
  }

  .card.card-memo.expanded .card-memo-icon {
    transform: rotate(180deg);
  }

  .card-content {
    font-size: 14px;
    color: var(--text);
    line-height: 1.8;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
    white-space: pre-wrap;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, margin-top 0.3s ease, padding-top 0.3s ease;
    margin-top: 0;
    padding-top: 0;
  }

  .card.card-memo.expanded .card-content {
    max-height: 2000px;
    opacity: 1;
    margin-top: 12px;
    padding-top: 12px;
  }

  .card.card-memo.expanded .card-summary {
    -webkit-line-clamp: unset;
  }

  .card-copy-btn {
    display: none;
    position: absolute;
    top: 16px;
    right: 44px;
    padding: 4px 10px;
    font-size: 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--card-bg);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    z-index: 2;
  }

  .card.card-memo.expanded .card-copy-btn {
    display: inline-block;
  }

  .card-copy-btn:hover {
    background: var(--accent-light);
    color: var(--accent);
    border-color: var(--accent);
  }

  .card-copy-btn.copied {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  /* ===== 空状态 ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .empty-state p {
    font-size: 14px;
    line-height: 1.8;
  }

  /* ===== 浮动新建按钮 ===== */
  .fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 28px;
    border: none;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(74,124,89,0.4);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .fab:hover { transform: scale(1.1); box-shadow: 0 6px 20px rgba(74,124,89,0.5); }
  .fab:active { transform: scale(0.95); }

  /* ===== 弹窗遮罩 ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--card-bg);
    width: 100%;
    max-width: 560px;
    border-radius: 16px 16px 0 0;
    padding: 20px 24px calc(20px + env(safe-area-inset-bottom));
    box-shadow: 0 -4px 24px rgba(0,0,0,0.12);
    animation: slideUp 0.25s ease;
    max-height: 85vh;
    overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .modal-header h3 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    font-size: 22px;
    color: var(--text-muted);
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }

  .modal-close:hover { background: var(--tag-bg); }

  .form-group {
    margin-bottom: 14px;
  }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 5px;
  }

  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s;
  }

  .form-group input:focus,
  .form-group textarea:focus,
  .form-group select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-light);
  }

  .form-group textarea {
    min-height: 80px;
    resize: vertical;
  }

  .form-row {
    display: flex;
    gap: 10px;
  }

  .form-row .form-group { flex: 1; }

  .form-actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
  }

  .btn {
    flex: 1;
    padding: 10px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    transition: all 0.2s;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .btn-primary:hover { opacity: 0.9; }

  .btn-secondary {
    background: var(--card-bg);
    color: var(--text-secondary);
  }

  .btn-secondary:hover { background: var(--tag-bg); }

  /* ===== 本地笔记删除按钮 ===== */
  .card-delete-btn {
    display: none;
    position: absolute;
    bottom: 16px;
    right: 20px;
    padding: 3px 8px;
    font-size: 11px;
    border: 1px solid #e0c8c8;
    border-radius: 6px;
    background: #fff;
    color: #b55;
    cursor: pointer;
    transition: all 0.2s;
    z-index: 2;
  }

  .card.card-memo.expanded .card-delete-btn {
    display: inline-block;
  }

  .card-delete-btn:hover {
    background: #fde8e8;
    border-color: #c88;
  }

  /* ===== 同步状态提示 ===== */
  .sync-status {
    display: none;
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 24px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    background: #333;
    color: #fff;
    z-index: 10000;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    animation: fadeIn 0.2s ease;
  }

  .sync-status.success { background: var(--accent); }
  .sync-status.warn { background: #c57a20; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(-50%) translateY(-10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ===== 响应式 ===== */
  @media (max-width: 600px) {
    .topbar-inner {
      flex-wrap: wrap;
      gap: 10px;
    }
    .search-box { order: 3; flex-basis: 100%; }
    .card { padding: 14px 16px; }
    .modal { padding: 16px 16px calc(16px + env(safe-area-inset-bottom)); }
    .fab { bottom: 20px; right: 20px; }
  }
  /* ===== 密码锁屏 ===== */
  .lock-screen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .lock-screen.hidden { display: none; }

  .lock-box {
    text-align: center;
    padding: 40px;
  }

  .lock-icon {
    font-size: 48px;
    margin-bottom: 16px;
  }

  .lock-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .lock-subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
  }

  .lock-input {
    width: 200px;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 20px;
    text-align: center;
    letter-spacing: 8px;
    background: var(--card-bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
    -webkit-text-security: disc;
  }

  .lock-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-light);
  }

  .lock-input.error {
    border-color: #c55;
    animation: lockShake 0.4s ease;
  }

  @keyframes lockShake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }

  .lock-hint {
    font-size: 12px;
    color: #c55;
    margin-top: 10px;
    height: 18px;
  }

  .lock-btn {
    margin-top: 16px;
    padding: 10px 36px;
    border: none;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .lock-btn:hover { opacity: 0.9; }
</style>
</head>
<body>

<!-- 密码锁屏 -->
<div class="lock-screen" id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">我的笔记</div>
    <div class="lock-subtitle">请输入密码访问</div>
    <input class="lock-input" id="lockInput" type="tel" maxlength="10" placeholder="····" autofocus
      onkeydown="if(event.key==='Enter')unlockApp()">
    <div class="lock-hint" id="lockHint"></div>
    <button class="lock-btn" onclick="unlockApp()">解锁</button>
  </div>
</div>

<!-- 顶栏 -->
<div class="topbar">
  <div class="topbar-inner">
    <span class="logo">📋 我的笔记</span>
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜索笔记标题、摘要、标签..." oninput="render()">
    </div>
    <div class="stats">
      <span class="count" id="totalCount">0</span> 条笔记
    </div>
  </div>
</div>

<!-- 主体 -->
<div class="main">
  <!-- 分类Tab -->
  <div class="category-tabs" id="categoryTabs"></div>

  <!-- 标签云 -->
  <div class="tag-cloud" id="tagCloud"></div>

  <!-- 结果提示 -->
  <div class="result-hint" id="resultHint"></div>

  <!-- 卡片区 -->
  <div id="cardArea"></div>
</div>

<!-- 浮动新建按钮 -->
<button class="fab" onclick="openNewNote()" title="新建笔记">+</button>

<!-- 新建笔记弹窗 -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">新建笔记</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="form-group">
      <label>标题 *</label>
      <input type="text" id="noteTitle" placeholder="笔记标题">
    </div>
    <div class="form-group">
      <label>链接（可选，留空则为备忘笔记）</label>
      <input type="url" id="noteLink" placeholder="https://...">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>分类</label>
        <select id="noteCategory"></select>
      </div>
      <div class="form-group">
        <label>来源</label>
        <input type="text" id="noteSource" placeholder="如：微信公众号">
      </div>
    </div>
    <div class="form-group">
      <label>标签（英文逗号分隔）</label>
      <input type="text" id="noteTags" placeholder="如：AI, 教程, OpenAI">
    </div>
    <div class="form-group">
      <label>摘要</label>
      <textarea id="noteSummary" placeholder="一句话概括这条笔记的核心内容" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>正文内容（备忘笔记展开后显示）</label>
      <textarea id="noteContent" placeholder="详细内容..." rows="4"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveNote()">保存</button>
    </div>
  </div>
</div>

<!-- Token 设置弹窗 -->
<div class="modal-overlay" id="tokenOverlay" onclick="if(event.target===this)closeTokenSetup()">
  <div class="modal">
    <div class="modal-header">
      <h3>设置云同步</h3>
      <button class="modal-close" onclick="closeTokenSetup()">&times;</button>
    </div>
    <p style="font-size:13px;color:var(--text-secondary);margin-bottom:14px;line-height:1.7;">
      输入 GitHub Token 后，在任何设备新建的笔记都会永久保存并多端同步。
    </p>
    <div class="form-group">
      <label>GitHub Token</label>
      <input type="password" id="tokenInput" placeholder="ghp_xxxxxxxxxxxx"
        onkeydown="if(event.key==='Enter')saveToken()">
    </div>
    <p style="font-size:11px;color:var(--text-muted);margin-bottom:14px;line-height:1.6;">
      获取方法：打开 github.com/settings/tokens → Generate new token (classic) → 勾选 repo 权限 → 生成并复制
    </p>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="closeTokenSetup()">跳过</button>
      <button class="btn btn-primary" onclick="saveToken()">保存</button>
    </div>
  </div>
</div>

<script>
// ===== 数据注入 =====
const __DATA__ = {
  "meta": {
    "version": "1.0",
    "created_at": "2026-07-16",
    "description": "个人笔记收藏夹 - 按分类整理的文章、链接及关键纪要"

// ===== GitHub API 配置 =====
const GH_REPO = 'Murphy1998/notes-app';
// token 存储在 localStorage，首次使用时引导设置
function getGHToken() { return localStorage.getItem('gh-notes-token') || ''; }
function setGHToken(t) { localStorage.setItem('gh-notes-token', t); }
const GH_DB_PATH = 'database.json'; // 仓库中 database.json 的路径
let __REMOTE_NOTES__ = null; // 远程拉取的最新笔记
let __SYNCING__ = false; // 是否正在同步

// ===== 状态 =====
let activeCategory = '全部';
let activeTag = null;

// ===== 工具函数 =====
function formatDate(dateStr) {
  const d = new Date(dateStr);
  const now = new Date();
  const diff = now - d;
  const days = Math.floor(diff / 86400000);

  if (days === 0) return '今天';
  if (days === 1) return '昨天';
  if (days < 7) return `${days} 天前`;
  if (days < 30) return `${Math.floor(days / 7)} 周前`;

  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatDateGroup(dateStr) {
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  return `${y}年${m}月${day}日 ${weekdays[d.getDay()]}`;
}

// ===== localStorage 本地笔记（仅作为同步失败时的临时缓存） =====
const LOCAL_NOTES_KEY = 'my-notes-local';

function getLocalNotes() {
  try {
    return JSON.parse(localStorage.getItem(LOCAL_NOTES_KEY) || '[]');
  } catch(e) { return []; }
}

function saveLocalNotes(notes) {
  localStorage.setItem(LOCAL_NOTES_KEY, JSON.stringify(notes));
}

function getAllNotes() {
  // 优先使用远程数据，兜底用构建时注入的静态数据
  const baseNotes = __REMOTE_NOTES__ || __DATA__.notes;
  return [...baseNotes, ...getLocalNotes()];
}

// ===== GitHub API 同步 =====
async function ghApiFetch(path, options = {}) {
  const token = getGHToken();
  if (!token) {
    showTokenSetup();
    throw new Error('未设置 GitHub Token');
  }
  const resp = await fetch(`https://api.github.com/repos/${GH_REPO}/contents/${path}`, {
    ...options,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...(options.headers || {})
    }
  });
  return resp;
}

// Token 设置弹窗
function showTokenSetup() {
  document.getElementById('tokenOverlay').classList.add('show');
  setTimeout(() => document.getElementById('tokenInput').focus(), 200);
}

function closeTokenSetup() {
  document.getElementById('tokenOverlay').classList.remove('show');
}

function saveToken() {
  const val = document.getElementById('tokenInput').value.trim();
  if (!val) { document.getElementById('tokenInput').style.borderColor='#c55'; return; }
  setGHToken(val);
  closeTokenSetup();
  showSyncStatus('Token 已保存，正在同步...', 'success');
  initRemoteData();
}

// Base64 解码（支持 UTF-8 中文）
function b64DecodeUnicode(str) {
  const binStr = atob(str);
  const bytes = Uint8Array.from(binStr, c => c.charCodeAt(0));
  return new TextDecoder().decode(bytes);
}

// 从 GitHub 拉取最新 database.json
async function fetchRemoteNotes() {
  try {
    const resp = await ghApiFetch(GH_DB_PATH);
    if (!resp.ok) return null;
    const fileInfo = await resp.json();
    const content = JSON.parse(b64DecodeUnicode(fileInfo.content));
    return { data: content, sha: fileInfo.sha };
  } catch(e) {
    console.log('拉取远程数据失败:', e);
    return null;
  }
}

// 将笔记写入 GitHub 仓库的 database.json
async function pushToGitHub(newDbData, sha, message) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(newDbData, null, 2))));
  const resp = await ghApiFetch(GH_DB_PATH, {
    method: 'PUT',
    body: JSON.stringify({ message, content, sha })
  });
  return resp;
}

// 页面加载时拉取最新数据
async function initRemoteData() {
  if (!getGHToken()) {
    // 未设置 token，延迟弹出引导
    setTimeout(() => { if (!getGHToken()) showTokenSetup(); }, 800);
    return;
  }
  const result = await fetchRemoteNotes();
  if (result) {
    __REMOTE_NOTES__ = result.data.notes;
    // 检查是否有待同步的本地笔记
    const locals = getLocalNotes();
    if (locals.length > 0) {
      await syncLocalToRemote(result.data, result.sha, locals);
    }
    render();
  }
}

// 将本地暂存的笔记同步到 GitHub
async function syncLocalToRemote(dbData, sha, locals) {
  try {
    const newDb = { ...dbData };
    locals.forEach(n => {
      const cleanNote = { ...n };
      delete cleanNote._local;
      newDb.notes.push(cleanNote);
    });
    const resp = await pushToGitHub(newDb, sha, `同步 ${locals.length} 条本地暂存笔记`);
    if (resp.ok) {
      saveLocalNotes([]); // 清空本地暂存
      __REMOTE_NOTES__ = newDb.notes;
      render();
    }
  } catch(e) {
    console.log('同步本地笔记失败:', e);
  }
}

function getFilteredNotes() {
  let notes = getAllNotes();

  // 分类筛选
  if (activeCategory !== '全部') {
    notes = notes.filter(n => n.category === activeCategory);
  }

  // 标签筛选
  if (activeTag) {
    notes = notes.filter(n => n.tags && n.tags.includes(activeTag));
  }

  // 搜索筛选
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (query) {
    notes = notes.filter(n => {
      const searchStr = [
        n.title || '',
        n.summary || '',
        n.content || '',
        (n.tags || []).join(' '),
        n.source || '',
        n.category || ''
      ].join(' ').toLowerCase();
      return searchStr.includes(query);
    });
  }

  return notes.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
}

function getAllTags() {
  const tagCount = {};
  getAllNotes().forEach(n => {
    (n.tags || []).forEach(t => {
      tagCount[t] = (tagCount[t] || 0) + 1;
    });
  });
  return Object.entries(tagCount).sort((a, b) => b[1] - a[1]);
}

function getCategoryCounts() {
  const all = getAllNotes();
  const counts = { '全部': all.length };
  __DATA__.categories.forEach(cat => {
    counts[cat] = all.filter(n => n.category === cat).length;
  });
  return counts;
}

// ===== 渲染 =====
function render() {
  const notes = getFilteredNotes();
  const categoryCounts = getCategoryCounts();
  const allTags = getAllTags();

  // 总数
  document.getElementById('totalCount').textContent = notes.length;

  // 分类Tab
  const catTabs = document.getElementById('categoryTabs');
  catTabs.innerHTML = ['全部', ...__DATA__.categories].map(cat => {
    const count = categoryCounts[cat] || 0;
    const activeCls = activeCategory === cat ? ' active' : '';
    return `<span class="category-tab${activeCls}" data-cat="${cat}" onclick="selectCategory('${cat.replace(/'/g, "\\'")}')">
      ${cat}<span class="badge">${count}</span>
    </span>`;
  }).join('');

  // 标签云
  const tagCloud = document.getElementById('tagCloud');
  if (allTags.length > 0) {
    tagCloud.innerHTML = allTags.map(([tag, count]) => {
      const activeCls = activeTag === tag ? ' active' : '';
      return `<span class="tag-chip${activeCls}" data-tag="${tag}" onclick="selectTag('${tag.replace(/'/g, "\\'")}')">
        #${tag} <span style="opacity:0.6">${count}</span>
      </span>`;
    }).join('');
    tagCloud.style.display = 'flex';
  } else {
    tagCloud.style.display = 'none';
  }

  // 结果提示
  const hint = document.getElementById('resultHint');
  if (notes.length === 0) {
    hint.textContent = '没有找到匹配的笔记，试试换个关键词或分类';
  } else {
    hint.textContent = `共 ${notes.length} 条笔记`;
  }

  // 卡片区
  const cardArea = document.getElementById('cardArea');

  if (notes.length === 0) {
    cardArea.innerHTML = `
      <div class="empty-state">
        <div class="icon">📭</div>
        <p>这里还没有笔记</p>
        <p style="font-size:13px;margin-top:4px;">把链接发给 CatPaw，我来帮你整理归档</p>
      </div>`;
    return;
  }

  // 按日期分组
  const groups = {};
  notes.forEach(n => {
    const dateKey = n.created_at ? n.created_at.split('T')[0] : 'unknown';
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(n);
  });

  cardArea.innerHTML = Object.entries(groups).map(([dateKey, groupNotes]) => {
    const cards = groupNotes.map(n => {
      const tagsHtml = (n.tags || []).map(t =>
        `<span class="card-tag" onclick="event.stopPropagation();selectTag('${t.replace(/'/g, "\\'")}')">#${t}</span>`
      ).join('');

      const isMemo = !n.link;

      if (isMemo) {
        // 备忘型卡片：点击展开/收起
        const contentHtml = n.content ? `<div class="card-content">${escapeHtml(n.content).replace(/\n/g, '<br>')}</div>` : '';
        const copyId = 'copy-' + (n.id || Math.random().toString(36).slice(2));
        const isLocal = n._local;
        const deleteBtn = `<button class="card-delete-btn" onclick="event.stopPropagation();deleteNote('${(n.id || '').replace(/'/g, "\\'")}')">删除</button>`;
        return `<div class="card card-memo" onclick="toggleMemo(this)">
          <button class="card-copy-btn" id="${copyId}" onclick="event.stopPropagation();copyNote(this, '${(n.id || '').replace(/'/g, "\\'")}')" title="复制全文">复制</button>
          <span class="card-memo-icon">▼</span>
          <div class="card-title">${escapeHtml(n.title || '无标题')}</div>
          <div class="card-summary">${escapeHtml(n.summary || '暂无摘要')}</div>
          ${contentHtml}
          <div class="card-meta">
            ${n.source ? `<span class="card-source">${escapeHtml(n.source)}</span>` : ''}
            ${isLocal ? '<span class="card-source" style="background:#e8f0ea;color:#4a7c59">本地</span>' : ''}
            <span class="card-date">${formatDate(n.created_at)}</span>
            <div class="card-tags">${tagsHtml}</div>
          </div>
          ${deleteBtn}
        </div>`;
      } else {
        // 链接型卡片：点击跳转
        return `<a class="card" href="${n.link}" target="_blank" rel="noopener">
          <span class="card-external-icon">↗</span>
          <div class="card-title">${escapeHtml(n.title || '无标题')}</div>
          <div class="card-summary">${escapeHtml(n.summary || '暂无摘要')}</div>
          <div class="card-meta">
            ${n.source ? `<span class="card-source">${escapeHtml(n.source)}</span>` : ''}
            <span class="card-date">${formatDate(n.created_at)}</span>
            <div class="card-tags">${tagsHtml}</div>
          </div>
        </a>`;
      }
    }).join('');

    return `<div class="date-group">
      <div class="date-label">${formatDateGroup(dateKey)}</div>
      <div class="card-flow">${cards}</div>
    </div>`;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toggleMemo(el) {
  el.classList.toggle('expanded');
}

function copyNote(btn, noteId) {
  const allNotes = getAllNotes();
  const note = allNotes.find(n => n.id === noteId);
  if (!note) return;

  let text = note.title + '\n\n';
  if (note.summary) text += note.summary + '\n\n';
  if (note.content) text += note.content;
  if (note.link) text += '\n\n链接：' + note.link;

  navigator.clipboard.writeText(text.trim()).then(() => {
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 1500);
  }).catch(() => {
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text.trim();
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    btn.textContent = '已复制';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 1500);
  });
}

function selectCategory(cat) {
  activeCategory = cat;
  activeTag = null;
  document.getElementById('searchInput').value = '';
  render();
}

function selectTag(tag) {
  if (activeTag === tag) {
    activeTag = null;
  } else {
    activeTag = tag;
    activeCategory = '全部';
  }
  document.getElementById('searchInput').value = '';
  render();
}

// ===== 键盘快捷键 =====
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    activeCategory = '全部';
    activeTag = null;
    document.getElementById('searchInput').value = '';
    render();
  }
});

// ===== 新建笔记 =====
function openNewNote() {
  document.getElementById('modalTitle').textContent = '新建笔记';
  document.getElementById('noteTitle').value = '';
  document.getElementById('noteLink').value = '';
  document.getElementById('noteSource').value = '';
  document.getElementById('noteTags').value = '';
  document.getElementById('noteSummary').value = '';
  document.getElementById('noteContent').value = '';

  // 填充分类下拉
  const sel = document.getElementById('noteCategory');
  sel.innerHTML = __DATA__.categories.map(c => `<option value="${c}">${c}</option>`).join('');

  document.getElementById('modalOverlay').classList.add('show');
  setTimeout(() => document.getElementById('noteTitle').focus(), 200);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

async function saveNote() {
  const title = document.getElementById('noteTitle').value.trim();
  if (!title) { document.getElementById('noteTitle').style.borderColor='#c55'; return; }

  const link = document.getElementById('noteLink').value.trim();
  const category = document.getElementById('noteCategory').value;
  const source = document.getElementById('noteSource').value.trim();
  const tagsStr = document.getElementById('noteTags').value.trim();
  const summary = document.getElementById('noteSummary').value.trim();
  const content = document.getElementById('noteContent').value.trim();

  const tags = tagsStr ? tagsStr.split(/[,，]/).map(t => t.trim()).filter(Boolean) : [];

  const noteId = 'n' + Date.now().toString(36);
  const note = {
    id: noteId,
    title: title,
    category: category,
    tags: tags,
    summary: summary || '',
    source: source || '',
    created_at: new Date().toISOString()
  };

  if (link) note.link = link;
  if (content) note.content = content;

  // 先关闭弹窗，显示同步状态
  closeModal();
  showSyncStatus('正在保存...');

  try {
    // 从 GitHub 拉取最新数据
    const result = await fetchRemoteNotes();
    if (!result) throw new Error('无法连接 GitHub');

    // 追加新笔记
    const newDb = { ...result.data };
    newDb.notes.push(note);

    // 推送到 GitHub
    const resp = await pushToGitHub(newDb, result.sha, `新增笔记: ${title}`);
    if (!resp.ok) throw new Error('推送失败');

    __REMOTE_NOTES__ = newDb.notes;
    showSyncStatus('保存成功！页面将在1-2分钟后自动更新', 'success');
  } catch(e) {
    console.log('保存到 GitHub 失败，暂存本地:', e);
    note._local = true;
    const locals = getLocalNotes();
    locals.push(note);
    saveLocalNotes(locals);
    showSyncStatus('网络异常，已暂存本地，联网后自动同步', 'warn');
  }
  render();
}

async function deleteNote(noteId) {
  if (!confirm('确定删除这条笔记？')) return;

  // 如果是本地暂存的笔记，直接从 localStorage 删除
  const locals = getLocalNotes();
  if (locals.some(n => n.id === noteId)) {
    saveLocalNotes(locals.filter(n => n.id !== noteId));
    render();
    return;
  }

  // 远程笔记，从 GitHub 删除
  showSyncStatus('正在删除...');
  try {
    const result = await fetchRemoteNotes();
    if (!result) throw new Error('无法连接 GitHub');

    const newDb = { ...result.data };
    newDb.notes = newDb.notes.filter(n => n.id !== noteId);

    const resp = await pushToGitHub(newDb, result.sha, `删除笔记: ${noteId}`);
    if (!resp.ok) throw new Error('删除失败');

    __REMOTE_NOTES__ = newDb.notes;
    showSyncStatus('删除成功', 'success');
  } catch(e) {
    showSyncStatus('删除失败，请稍后重试', 'warn');
  }
  render();
}

// 同步状态提示
function showSyncStatus(msg, type) {
  let el = document.getElementById('syncStatus');
  if (!el) {
    el = document.createElement('div');
    el.id = 'syncStatus';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.className = 'sync-status';
  if (type) el.classList.add(type);
  el.style.display = 'block';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// ===== 密码锁 =====
const __PWD_HASH__ = 'x20r';

function simpleHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return h.toString(36);
}

function checkAuth() {
  return sessionStorage.getItem('notes-auth') === __PWD_HASH__;
}

function unlockApp() {
  const input = document.getElementById('lockInput');
  const hint = document.getElementById('lockHint');
  const pwd = input.value.trim();
  if (simpleHash(pwd) === __PWD_HASH__) {
    sessionStorage.setItem('notes-auth', __PWD_HASH__);
    document.getElementById('lockScreen').classList.add('hidden');
    hint.textContent = '';
    // 解锁后拉取远程数据（会自动引导设置 Token）
    initRemoteData();
  } else {
    input.classList.add('error');
    hint.textContent = '密码错误，请重试';
    input.value = '';
    setTimeout(() => input.classList.remove('error'), 500);
  }
}

// 初始化：检查是否已验证
if (checkAuth()) {
  document.getElementById('lockScreen').classList.add('hidden');
}

// ===== 初始渲染 =====
render();

// ===== 拉取远程最新数据（仅已通过密码验证时） =====
if (checkAuth()) {
  initRemoteData();
}

// ===== PWA Service Worker =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    console.log('SW registered:', reg.scope);
  }).catch(err => {
    console.log('SW registration failed:', err);
  });
}
